name: Build Server and Client for All OS

on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile server
        run: |
          g++ server.cpp -o server
          if [ "$RUNNER_OS" == "Windows" ]; then mv server server.exe; fi

      - name: Compile client
        run: |
          g++ client.cpp -o client
          if [ "$RUNNER_OS" == "Windows" ]; then mv client client.exe; fi

      - name: Zip executables
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell Compress-Archive -Path server.exe,client.exe -DestinationPath server-client-windows.zip
          else
            zip server-client-${{ matrix.os }} server* client*
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: server-client-${{ matrix.os }}
          path: server-client-*.zip